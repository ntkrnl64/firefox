[no-beforeinput-when-no-selection.html]
  expected:
    if asan and fission: [TIMEOUT, OK]
    [OK, TIMEOUT]
  [Typing Delete]
    expected:
      if asan and fission: [TIMEOUT, PASS, NOTRUN]
      if asan and not fission: [PASS, NOTRUN]
      [PASS, TIMEOUT]

  [Typing Enter]
    expected:
      if asan and fission: [NOTRUN, PASS]
      [PASS, NOTRUN]

  [Typing Shift + Enter]
    expected:
      if asan and fission: [NOTRUN, PASS]
      [PASS, NOTRUN]

  [Typing Backspace]
    expected:
      if asan: [PASS, TIMEOUT]
